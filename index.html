<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
<style>
:root {
  --bg:#0e0e0e; --surface:#161616; --surface2:#1e1e1e;
  --border:#2a2a2a; --border2:#333;
  --accent:#e8ff47; --accent-dim:#c8dd30;
  --text:#f0f0f0; --text2:#888; --text3:#555;
  --radius:6px;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --cat-p:#47b4ff; --cat-d:#7fff8a; --cat-e:#ffb347;
  --sidebar:240px;
}
body.day-mode {
  --bg:#ffffff; --surface:#ffffff; --surface2:#f5f5f5;
  --border:#e2e2e2; --border2:#d0d0d0;
  --accent:#1a6ef5; --accent-dim:#1558cc;
  --text:#111111; --text2:#666666; --text3:#aaaaaa;
}

/* Logo */
body.day-mode .logo { color:#111; }
body.day-mode .logo-db { color:#888; }
body.day-mode .logo-img { filter:brightness(0); }

/* Backgrounds — everything white, no dark surfaces */
body.day-mode html { background:#fff; }
body.day-mode header { background:#fff; border-bottom:1px solid #e2e2e2; }
body.day-mode .sidebar { background:#fff; border-right:1px solid #e2e2e2; }
body.day-mode .toolbar { background:#fff; border-bottom:1px solid #e2e2e2; }
body.day-mode .filter-bar { background:#fff; border-bottom:1px solid #e2e2e2; }
body.day-mode .grid-wrap { background:#fff; }
body.day-mode .main { background:#fff; }
body.day-mode .app { background:#fff; }

/* Sidebar */
body.day-mode .sidebar-item:hover { background:#f0f5ff; }
body.day-mode .sidebar-item.active { background:#e8f0fe; border-left-color:#1a6ef5; }
body.day-mode .sidebar-title { color:#aaa; }
body.day-mode .sidebar-item-name { color:#111; }
body.day-mode .sidebar-item.all .sidebar-item-name { color:#1a6ef5; }
body.day-mode .sidebar-add-btn { background:none; border:none; color:#aaa; }
body.day-mode .sidebar-add-btn:hover { color:#1a6ef5; border:none; }
body.day-mode .sidebar-toggle { color:#aaa; }
body.day-mode .sidebar-toggle:hover { color:#111; border:none; }

/* Cards */
body.day-mode .card { background:#fff; border:1px solid #e2e2e2; }
body.day-mode .card:hover { border-color:#1a6ef5; }
body.day-mode .card-name { color:#111; }
body.day-mode .genre-tag { background:#eef2ff; border-color:#d0d8ff; color:#3355cc; }
body.day-mode .card-social-link { background:#f5f5f5; border-color:#e2e2e2; color:#555; }
body.day-mode .card-social-link:hover { color:#1a6ef5; border-color:#1a6ef5; }

/* Category badges — solid colors in day mode */
body.day-mode .badge-Presentator { background:#1a6ef5; color:#fff; border-color:#1a6ef5; }
body.day-mode .badge-Deelnemer { background:#0d9e6e; color:#fff; border-color:#0d9e6e; }
body.day-mode .badge-Expert { background:#e07b00; color:#fff; border-color:#e07b00; }

/* Pills */
body.day-mode .pill { border:1px solid #d0d0d0; color:#555; background:#fff; }
body.day-mode .pill:hover { border-color:#1a6ef5; color:#1a6ef5; }
body.day-mode .pill.active { background:#1a6ef5; color:#fff; border-color:#1a6ef5; }
body.day-mode .filter-sep { background:#e2e2e2; }

/* Buttons — all white with border, primary blue */
body.day-mode button { background:#fff; color:#111; border:1px solid #d0d0d0; }
body.day-mode button:hover { border-color:#1a6ef5; color:#1a6ef5; }
body.day-mode .btn-primary { background:#1a6ef5; color:#fff; border-color:#1a6ef5; }
body.day-mode .btn-primary:hover { background:#1558cc; border-color:#1558cc; color:#fff; }
body.day-mode .btn-danger { color:#cc2222; border-color:#cc2222; background:transparent; }
body.day-mode .btn-sm { background:#fff; color:#111; border:1px solid #d0d0d0; }
body.day-mode .btn-sm:hover { border-color:#1a6ef5; color:#1a6ef5; }
body.day-mode #mode-toggle { background:#fff; border:1px solid #d0d0d0; color:#111; }

/* Inputs */
body.day-mode input, body.day-mode select, body.day-mode textarea { background:#fff; color:#111; border:1px solid #d0d0d0; }
body.day-mode input:focus, body.day-mode select:focus, body.day-mode textarea:focus { border-color:#1a6ef5; }

/* Zoekbalk wrapper */
body.day-mode .search-wrap input { background:#fff; }

/* Modal */
body.day-mode .overlay { background:rgba(0,0,0,0.35); }
body.day-mode .modal { background:#fff; border:1px solid #e2e2e2; }
body.day-mode .modal-title { color:#1a6ef5; }
body.day-mode .field-label { color:#888; }
body.day-mode .divider { background:#e2e2e2; }

/* Project banner */
body.day-mode .project-banner { background:#fff; border-bottom:1px solid #e2e2e2; }
body.day-mode .banner-name { color:#1a6ef5; }
body.day-mode .banner-desc { color:#666; }

/* Selecting bar */
body.day-mode .selecting-bar { background:#1a6ef5; }
body.day-mode .selecting-text { color:#fff; }
body.day-mode .selecting-bar button { background:rgba(255,255,255,0.2); border-color:rgba(255,255,255,0.4); color:#fff; }

/* Picker buttons */
body.day-mode .pick-btn { background:#fff; color:#555; border:1px solid #d0d0d0; }
body.day-mode .pick-btn.selected { background:#1a6ef5; color:#fff; border-color:#1a6ef5; }
body.day-mode .cat-pick-btn { background:#fff; color:#555; border:1px solid #d0d0d0; }
body.day-mode .cat-pick-btn.selected.cp { background:#1a6ef5; color:#fff; border-color:#1a6ef5; }
body.day-mode .cat-pick-btn.selected.cd { background:#0d9e6e; color:#fff; border-color:#0d9e6e; }
body.day-mode .cat-pick-btn.selected.ce { background:#e07b00; color:#fff; border-color:#e07b00; }

/* Social blocks */
body.day-mode .social-block { background:#f5f5f5; border-color:#e2e2e2; }
body.day-mode .social-block-header { color:#555; }

/* Upload label */
body.day-mode .upload-btn-label { background:#fff; color:#555; border-color:#d0d0d0; }
body.day-mode .upload-btn-label:hover { border-color:#1a6ef5; color:#1a6ef5; }

/* Chips */
body.day-mode .chip { background:#f5f5f5; border-color:#e2e2e2; color:#111; }
body.day-mode .chip button { color:#aaa; }
body.day-mode .chip button:hover { color:#cc2222; }

/* Misc */
body.day-mode .count { color:#aaa; }
body.day-mode .toast { background:#111; color:#fff; }
body.day-mode .spinner { border-color:#e2e2e2; border-top-color:#1a6ef5; }
body.day-mode .empty { color:#bbb; }
body.day-mode .genre-chip { background:#f5f5f5; border-color:#e2e2e2; color:#111; }

*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);color:var(--text);font-family:var(--font-body);}
body{min-height:100vh;display:flex;flex-direction:column;}

header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;}
.logo{font-family:var(--font-display);font-size:1.8rem;letter-spacing:2px;color:var(--accent);line-height:1;}
.logo span{color:var(--text2);font-size:0.85rem;letter-spacing:4px;display:block;font-family:var(--font-body);font-weight:300;margin-top:2px;}
.header-actions{display:flex;gap:8px;}

.app{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transition:width 0.25s ease;overflow-x:hidden;}
.sidebar.collapsed{width:48px;}
.sidebar-header{padding:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sidebar-title{font-family:var(--font-display);font-size:1rem;letter-spacing:1px;color:var(--text3);white-space:nowrap;overflow:hidden;transition:opacity 0.2s;}
.sidebar.collapsed .sidebar-title{opacity:0;width:0;}
.sidebar-toggle{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:color 0.15s;}
.sidebar-toggle:hover{color:var(--text);border:none;}
.sidebar-toggle svg{transition:transform 0.25s;}
.sidebar.collapsed .sidebar-toggle svg{transform:rotate(180deg);}
.sidebar-content{display:flex;flex-direction:column;transition:opacity 0.2s;}
.sidebar.collapsed .sidebar-content{opacity:0;pointer-events:none;}
.sidebar-item{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1rem;cursor:pointer;transition:background 0.1s;border-left:2px solid transparent;white-space:nowrap;}
.sidebar-item:hover{background:var(--surface2);}
.sidebar-item.active{background:var(--surface2);border-left-color:var(--accent);}
.sidebar-item-name{font-size:13px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-item.all .sidebar-item-name{color:var(--accent);font-weight:500;}
.sidebar-item-count{font-size:11px;color:var(--text3);margin-left:6px;flex-shrink:0;}
.sidebar-add-btn{margin:0.75rem 1rem;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:var(--font-body);padding:0;white-space:nowrap;}
.sidebar-add-btn:hover{color:var(--text2);}
.sidebar-divider{height:1px;background:var(--border);margin:4px 0;}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow-y:auto;}

/* PROJECT BANNER */
.project-banner{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:0.75rem 1.5rem;align-items:center;gap:14px;}
.project-banner.visible{display:flex;}
.banner-name{font-family:var(--font-display);font-size:1.4rem;letter-spacing:1px;color:var(--accent);}
.banner-desc{font-size:12px;color:var(--text2);flex:1;}
.banner-actions{display:flex;gap:6px;}

/* SELECTING BAR */
.selecting-bar{display:none;background:var(--accent);padding:0.65rem 1.5rem;align-items:center;gap:10px;}
.selecting-bar.visible{display:flex;}
.selecting-text{font-size:13px;font-weight:500;color:#000;flex:1;}
.selecting-bar button{font-size:12px;padding:5px 12px;background:rgba(0,0,0,0.15);border:1px solid rgba(0,0,0,0.2);color:#000;}
.selecting-bar button:hover{background:rgba(0,0,0,0.25);}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid var(--border);}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none;}
.search-wrap input{padding-left:38px;}

.filter-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:0.75rem 1.5rem;border-bottom:1px solid var(--border);}
.filter-sep{width:1px;height:18px;background:var(--border2);margin:0 2px;}
.pill{font-size:12px;padding:4px 12px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font-body);transition:all 0.15s;}
.pill:hover{border-color:var(--text3);color:var(--text);}
.pill.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500;}

/* GRID */
.grid-wrap{padding:1.25rem 1.5rem 4rem;}
.count{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:1rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color 0.15s,transform 0.15s;position:relative;}
.card:hover{border-color:var(--border2);transform:translateY(-1px);}
.card.selected-card{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.card-check{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.55);border:1.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;z-index:2;transition:all 0.15s;}
.card.selected-card .card-check{background:var(--accent);border-color:var(--accent);}
.card-remove{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;z-index:2;font-size:14px;color:var(--text2);transition:all 0.15s;text-decoration:none;}
.card-remove:hover{background:rgba(255,107,107,0.3);color:#ff6b6b;}
.card-photo{width:100%;aspect-ratio:1;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:2.2rem;overflow:hidden;}
.card-photo img{width:100%;height:100%;object-fit:cover;}
.card-body{padding:9px 11px 11px;}
.card-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3;}
.card-genres{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.genre-tag{font-size:10px;padding:1px 6px;border-radius:99px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);}
.card-cats{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.card-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;letter-spacing:0.4px;font-weight:500;text-transform:uppercase;}
.badge-Presentator{background:rgba(71,180,255,0.12);color:var(--cat-p);border:1px solid rgba(71,180,255,0.25);}
.badge-Deelnemer{background:rgba(127,255,138,0.10);color:var(--cat-d);border:1px solid rgba(127,255,138,0.22);}
.badge-Expert{background:rgba(255,179,71,0.12);color:var(--cat-e);border:1px solid rgba(255,179,71,0.25);}
.card-socials{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.card-social-link{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--text2);text-decoration:none;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;transition:border-color 0.12s,color 0.12s;}
.card-social-link:hover{color:var(--accent);border-color:var(--accent);}
.empty{grid-column:1/-1;text-align:center;padding:5rem;color:var(--text3);font-size:14px;}

/* INPUTS & BUTTONS */
input,select,textarea{background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius);padding:8px 12px;font-family:var(--font-body);font-size:13px;width:100%;outline:none;transition:border-color 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--surface2);}
textarea{resize:vertical;}
button{font-family:var(--font-body);font-size:13px;cursor:pointer;border-radius:var(--radius);border:1px solid var(--border2);padding:8px 16px;transition:all 0.15s;background:var(--surface2);color:var(--text);}
button:hover{border-color:var(--text2);}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500;}
.btn-primary:hover{background:var(--accent-dim);border-color:var(--accent-dim);}
.btn-danger{color:#ff6b6b;border-color:rgba(255,107,107,0.3);background:transparent;}
.btn-danger:hover{background:rgba(255,107,107,0.08);}
.btn-sm{padding:5px 12px;font-size:12px;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;padding:1rem;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:10px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:16px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--font-display);font-size:1.6rem;letter-spacing:1px;color:var(--accent);}
.field-label{font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.divider{height:1px;background:var(--border);margin:2px 0;}

/* PHOTO */
.photo-upload-area{display:flex;gap:14px;align-items:flex-start;}
.photo-thumb{width:80px;height:80px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:1.5rem;color:var(--text2);}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-controls{flex:1;display:flex;flex-direction:column;gap:7px;}
.upload-btn-label{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);cursor:pointer;color:var(--text2);background:var(--surface2);transition:all 0.15s;font-family:var(--font-body);}
.upload-btn-label:hover{border-color:var(--text2);color:var(--text);}
.upload-btn-label input{display:none;}
.url-row{display:flex;gap:6px;}
.url-row input{flex:1;font-size:12px;}
.url-row button{font-size:12px;padding:7px 12px;white-space:nowrap;}

/* PICKERS */
.picker{display:flex;flex-wrap:wrap;gap:6px;}
.pick-btn,.cat-pick-btn{font-size:12px;padding:5px 12px;border-radius:99px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font-body);transition:all 0.12s;}
.pick-btn:hover,.cat-pick-btn:hover{border-color:var(--text2);color:var(--text);}
.pick-btn.selected{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500;}
.cat-pick-btn.selected.cp{background:rgba(71,180,255,0.15);color:var(--cat-p);border-color:rgba(71,180,255,0.4);font-weight:500;}
.cat-pick-btn.selected.cd{background:rgba(127,255,138,0.12);color:var(--cat-d);border-color:rgba(127,255,138,0.35);font-weight:500;}
.cat-pick-btn.selected.ce{background:rgba(255,179,71,0.12);color:var(--cat-e);border-color:rgba(255,179,71,0.35);font-weight:500;}

/* SOCIAL */
.social-row{display:flex;gap:8px;flex-wrap:wrap;}
.social-block{flex:1;min-width:160px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px;display:flex;flex-direction:column;gap:6px;}
.social-block-header{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-bottom:2px;}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{display:flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:99px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);}
.chip button{background:none;border:none;color:var(--text3);padding:0;font-size:14px;cursor:pointer;line-height:1;}
.chip button:hover{color:#ff6b6b;}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#000;font-size:13px;font-weight:500;padding:10px 20px;border-radius:99px;z-index:200;transition:transform 0.3s ease;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:5rem;color:var(--text3);font-size:13px;}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

let talents=[], genres=[], projecten=[], projectTalents={};

function colorFor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))&0xffff;return COLORS[h%COLORS.length];}
function initials(n){return n.split(' ').map(w=>w[0]).filter((_,i,a)=>i===0||i===a.length-1).join('').toUpperCase();}
function formatK(n){if(!n||isNaN(n))return null;n=Number(n);if(n>=1000000)return (n/1000000).toFixed(n%1000000===0?0:1).replace(/\.0$/,'')+'M';if(n>=1000)return (n/1000).toFixed(n%1000===0?0:1).replace(/\.0$/,'')+'K';return String(n);}
function tGenres(t){return Array.isArray(t.genres)&&t.genres.length?t.genres:(t.genre?[t.genre]:[]);}
function tCats(t){return Array.isArray(t.categorieen)&&t.categorieen.length?t.categorieen:(t.categorie?[t.categorie]:[]);}

// ── DATABASE ─────────────────────────────────────────────────────────
async function loadAll(){await Promise.all([loadGenres(),loadTalents(),loadProjecten()]);}

async function loadTalents(){
  const {data,error}=await db.from('talents').select('*').order('created_at',{ascending:false});
  if(error){document.getElementById('grid').innerHTML='<div class="empty">Kan niet verbinden. Check console.</div>';return;}
  talents=data||[];
  document.getElementById('all-count').textContent=talents.length;
  renderGrid();
}

async function loadGenres(){
  const {data,error}=await db.from('genres').select('*').order('naam');
  genres=error?['Entertainment','Reality','Music','Comedy','Sport','Media','Lifestyle','Info']:(data||[]).map(g=>g.naam);
  renderGenreFilters();
}

async function loadProjecten(){
  const {data:pd}=await db.from('projecten').select('*').order('created_at',{ascending:false});
  projecten=pd||[];
  const {data:pt}=await db.from('project_talents').select('*');
  projectTalents={};
  (pt||[]).forEach(r=>{if(!projectTalents[r.project_id])projectTalents[r.project_id]=[];projectTalents[r.project_id].push(r.talent_id);});
  renderSidebar();
}

async function saveTalentDB(t){
  const p={naam:t.naam,categorie:t.categorieen&&t.categorieen[0]?t.categorieen[0]:'',categorieen:t.categorieen||[],genre:t.genres&&t.genres[0]?t.genres[0]:'',genres:t.genres||[],mgmt:t.mgmt,notes:t.notes,foto_url:t.foto_url,ig_url:t.ig_url||'',ig_followers:t.ig_followers||null,tt_url:t.tt_url||'',tt_followers:t.tt_followers||null,yt_url:t.yt_url||'',yt_followers:t.yt_followers||null,expertise:t.expertise||'',gender:t.gender||''};
  if(t.id){const {error}=await db.from('talents').update(p).eq('id',t.id);if(error){showToast('Opslaan mislukt');return false;}}
  else{const {error}=await db.from('talents').insert(p);if(error){showToast('Toevoegen mislukt: '+error.message);return false;}}
  return true;
}

async function deleteTalentDB(id){const {error}=await db.from('talents').delete().eq('id',id);if(error){showToast('Verwijderen mislukt');return false;}return true;}

async function saveProjectDB(p){
  if(p.id){await db.from('projecten').update({naam:p.naam,omschrijving:p.omschrijving}).eq('id',p.id);return true;}
  const {data,error}=await db.from('projecten').insert({naam:p.naam,omschrijving:p.omschrijving}).select().single();
  if(error){showToast('Aanmaken mislukt: '+error.message);return false;}
  return data;
}

async function deleteProjectDB(id){const {error}=await db.from('projecten').delete().eq('id',id);if(error){showToast('Verwijderen mislukt');return false;}return true;}

async function addTalentsToProject(pid,ids){
  const rows=ids.map(tid=>({project_id:pid,talent_id:tid}));
  const {error}=await db.from('project_talents').upsert(rows,{onConflict:'project_id,talent_id'});
  if(error){showToast('Toevoegen mislukt: '+error.message);return false;}return true;
}

async function removeTalentFromProject(pid,tid){
  const {error}=await db.from('project_talents').delete().eq('project_id',pid).eq('talent_id',tid);
  if(error){showToast('Verwijderen mislukt');return false;}return true;
}

async function uploadPhoto(file){
  const ext=file.name.split('.').pop();const path='fotos/'+Date.now()+'.'+ext;
  const {error}=await db.storage.from('fotos').upload(path,file,{upsert:true});
  if(error){showToast('Upload mislukt');return null;}
  return db.storage.from('fotos').getPublicUrl(path).data.publicUrl;
}

async function saveGenreToDB(naam){const {error}=await db.from('genres').insert({naam});if(error){showToast('Mislukt');return false;}return true;}
async function deleteGenreFromDB(naam){const {error}=await db.from('genres').delete().eq('naam',naam);if(error){showToast('Mislukt');return false;}return true;}

// ── RENDER ───────────────────────────────────────────────────────────
function renderSidebar(){
  const el=document.getElementById('sidebar-projects');
  el.innerHTML=projecten.map(p=>{
    const count=(projectTalents[p.id]||[]).length;
    return '<div class="sidebar-item'+(activeProjectId===p.id?' active':'')+'" data-pid="'+p.id+'">'
      +'<span class="sidebar-item-name">'+p.naam+'</span>'
      +'<span class="sidebar-item-count">'+count+'</span></div>';
  }).join('');
  document.querySelector('.sidebar-item.all').classList.toggle('active',activeProjectId===null);
}

function renderGrid(){
  const grid=document.getElementById('grid');
  const projIds=activeProjectId?(projectTalents[activeProjectId]||[]):null;
  const list=talents.filter(t=>{
    const tg=tGenres(t),tc=tCats(t),q=searchQ.toLowerCase();
    return(!q||t.naam.toLowerCase().includes(q)||tg.join(' ').toLowerCase().includes(q))
      &&(activeCat==='alle'||tc.includes(activeCat))
      &&(activeGenres.size===0||[...activeGenres].every(g=>tg.includes(g)))
      &&(activeGender==='alle'||t.gender===activeGender)
      &&(!projIds||projIds.includes(t.id));
  });
  // Sort
  if(sortMode==='naam') list.sort((a,b)=>a.naam.localeCompare(b.naam,'nl'));
  else if(sortMode==='ig') list.sort((a,b)=>(b.ig_followers||0)-(a.ig_followers||0));
  else if(sortMode==='tt') list.sort((a,b)=>(b.tt_followers||0)-(a.tt_followers||0));
  else if(sortMode==='yt') list.sort((a,b)=>(b.yt_followers||0)-(a.yt_followers||0));
  document.getElementById('count').textContent=list.length+' talent'+(list.length!==1?'en':'');
  if(!list.length){grid.innerHTML='<div class="empty">Geen talenten gevonden</div>';return;}
  grid.innerHTML=list.map(t=>{
    const col=colorFor(t.naam),tg=tGenres(t),tc=tCats(t);
    const photoHTML=t.foto_url?'<img src="'+t.foto_url+'" alt="'+t.naam+'" loading="lazy">'
      :'<span style="color:'+col.text+'">'+initials(t.naam)+'</span>';
    const photoBg=t.foto_url?'':'background:'+col.bg+';';
    const genreTags=tg.map(g=>'<span class="genre-tag">'+g+'</span>').join('');
    const catBadges=tc.map(c=>{if(c==='Expert'&&t.expertise)return '<span class="card-badge badge-Expert">Expert: '+t.expertise+'</span>';return '<span class="card-badge badge-'+c+'">'+c+'</span>';}).join('');
    const igLink=t.ig_url?'<a class="card-social-link" href="'+t.ig_url+'" target="_blank" onclick="event.stopPropagation()">'+igSVG+(formatK(t.ig_followers)||'IG')+'</a>':'';
    const ttLink=t.tt_url?'<a class="card-social-link" href="'+t.tt_url+'" target="_blank" onclick="event.stopPropagation()">'+ttSVG+(formatK(t.tt_followers)||'TT')+'</a>':'';
    const ytLink=t.yt_url?'<a class="card-social-link" href="'+t.yt_url+'" target="_blank" onclick="event.stopPropagation()">'+ytSVG+(formatK(t.yt_followers)||'YT')+'</a>':'';
    const socials=(igLink||ttLink||ytLink)?'<div class="card-socials">'+igLink+ttLink+ytLink+'</div>':'';
    const isSelected=selectedIds.has(t.id);

    let overlay='';
    if(selectingMode){
      const checkMark=isSelected?'<svg width="12" height="12" fill="none" stroke="#000" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>':'';
      overlay='<div class="card-check">'+checkMark+'</div>';
    } else if(activeProjectId){
      overlay='<a class="card-remove" onclick="event.stopPropagation();removeFromProject('+t.id+')" title="Verwijder uit project">×</a>';
    }

    const cardClass='card'+(isSelected?' selected-card':'');
    const onclick=selectingMode?'toggleSelect('+t.id+')':'openModal(\'detail\','+t.id+')';

    return '<div class="'+cardClass+'" onclick="'+onclick+'">'
      +overlay
      +'<div class="card-photo" style="'+photoBg+'">'+photoHTML+'</div>'
      +'<div class="card-body">'
      +'<div class="card-name">'+t.naam+'</div>'
      +'<div class="card-genres">'+genreTags+'</div>'
      +'<div class="card-cats">'+catBadges+'</div>'
      +socials+'</div></div>';
  }).join('');
}

// ── PROJECTEN ────────────────────────────────────────────────────────
function selectProject(id){
  activeProjectId=id; cancelSelecting();
  const banner=document.getElementById('project-banner');
  if(id){
    const p=projecten.find(x=>x.id===id);
    document.getElementById('banner-naam').textContent=p.naam;
    document.getElementById('banner-desc').textContent=p.omschrijving||'';
    banner.classList.add('visible');
  } else {banner.classList.remove('visible');}
  renderSidebar(); renderGrid();
}

function startSelecting(){
  selectingForProject=activeProjectId;
  selectingMode=true; selectedIds=new Set();
  activeProjectId=null;
  document.getElementById('selecting-bar').classList.add('visible');
  updateSelectText(); renderSidebar(); renderGrid();
}

function toggleSelect(id){
  if(selectedIds.has(id))selectedIds.delete(id); else selectedIds.add(id);
  updateSelectText(); renderGrid();
}

function updateSelectText(){
  const n=selectedIds.size;
  document.getElementById('selecting-text').textContent=n===0?'Klik talenten aan om te selecteren':n+' talent'+(n!==1?'en':'')+' geselecteerd';
}

async function confirmSelection(){
  if(!selectingForProject){showToast('Geen project actief');return;}
  if(!selectedIds.size){cancelSelecting();return;}
  const ok=await addTalentsToProject(selectingForProject,Array.from(selectedIds));
  if(ok){
    const targetProject=selectingForProject;
    selectingMode=false; selectedIds=new Set(); selectingForProject=null;
    document.getElementById('selecting-bar').classList.remove('visible');
    await Promise.all([loadProjecten(), loadTalents()]);
    selectProject(targetProject);
    showToast('Toegevoegd aan project!');
  }
}

function cancelSelecting(){
  selectingMode=false; selectedIds=new Set();
  document.getElementById('selecting-bar').classList.remove('visible');
  if(selectingForProject){selectProject(selectingForProject);}
  selectingForProject=null; renderGrid();
}

async function removeFromProject(tid){
  if(!activeProjectId)return;
  const ok=await removeTalentFromProject(activeProjectId,tid);
  if(ok){await loadProjecten();renderGrid();showToast('Verwijderd uit project');}
}

async function deleteProject(){
  if(!activeProjectId||!confirm('Project verwijderen?'))return;
  const ok=await deleteProjectDB(activeProjectId);
  if(ok){activeProjectId=null;await loadProjecten();selectProject(null);showToast('Project verwijderd');}
}

// ── SORT & EXPORT ────────────────────────────────────────────────────
function setSort(v){sortMode=v;renderGrid();}

function getVisibleTalents(){
  const projIds=activeProjectId?(projectTalents[activeProjectId]||[]):null;
  let list=talents.filter(t=>{
    const tg=tGenres(t),tc=tCats(t),q=searchQ.toLowerCase();
    return(!q||t.naam.toLowerCase().includes(q)||tg.join(' ').toLowerCase().includes(q))
      &&(activeCat==='alle'||tc.includes(activeCat))
      &&(activeGenres.size===0||[...activeGenres].every(g=>tg.includes(g)))
      &&(activeGender==='alle'||t.gender===activeGender)
      &&(!projIds||projIds.includes(t.id));
  });
  if(sortMode==='naam') list.sort((a,b)=>a.naam.localeCompare(b.naam,'nl'));
  else if(sortMode==='ig') list.sort((a,b)=>(b.ig_followers||0)-(a.ig_followers||0));
  else if(sortMode==='tt') list.sort((a,b)=>(b.tt_followers||0)-(a.tt_followers||0));
  else if(sortMode==='yt') list.sort((a,b)=>(b.yt_followers||0)-(a.yt_followers||0));
  return list;
}

async function imgToBase64(url){
  try{
    const r=await fetch(url);
    const blob=await r.blob();
    return await new Promise(res=>{const rd=new FileReader();rd.onload=()=>res(rd.result);rd.readAsDataURL(blob);});
  }catch(e){return null;}
}

  const list=getVisibleTalents();

  const projectNaam=activeProjectId?(projecten.find(p=>p.id===activeProjectId)||{}).naam||'Project':'Alle talenten';
  window._exportList=list;
  window._exportNaam=projectNaam;

  document.getElementById('overlay').classList.add('open');
  const inner=document.getElementById('modal-inner');
  inner.innerHTML='';

  const header=document.createElement('div');
  header.className='modal-header';
  const title=document.createElement('span');

async function doExport(type){
  closeModal();
  const list=window._exportList||[];
  const projectNaam=window._exportNaam||'Talenten';
  showToast('Bezig met laden van foto\u2019s...');

  // Load all images as base64
  const b64map={};
  await Promise.all(list.map(async t=>{
    if(t.foto_url){const b=await imgToBase64(t.foto_url);if(b)b64map[t.id]=b;}
  }));

  if(type==='pdf'){
    await exportPDF(list,projectNaam,b64map);
  } else {
    await exportDOCX(list,projectNaam,b64map);
  }
}

async function exportPDF(list,projectNaam,b64map){
  const cards=list.map(t=>{
    const col=colorFor(t.naam);
    const b64=b64map[t.id];
    const photoHTML=b64
      ?'<img src="'+b64+'" style="width:120px;height:120px;border-radius:50%;object-fit:cover;border:2px solid #ddd;">'
      :'<div style="width:120px;height:120px;border-radius:50%;background:'+col.bg+';display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:600;color:'+col.text+';border:2px solid #ddd;">'+initials(t.naam)+'</div>';
    return '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;break-inside:avoid;">'
      +photoHTML
      +'<div style="font-size:13px;font-weight:600;text-align:center;color:#111;max-width:130px;line-height:1.3;">'+t.naam+'</div>'
      +'</div>';
  }).join('');

  const win=window.open('','_blank');
  if(!win){showToast('Pop-up geblokkeerd — sta pop-ups toe');return;}
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+projectNaam+'</title>'
    +'<style>'
    +'body{margin:0;padding:32px;font-family:Arial,sans-serif;background:#fff;}'
    +'h1{font-size:20px;font-weight:700;margin:0 0 8px;color:#111;}'
    +'p{font-size:12px;color:#888;margin:0 0 28px;}'
    +'.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:28px 16px;}'
    +'@page{size:A4;margin:20mm;}'
    +'@media print{body{padding:0;}}'
    +'</style></head><body>'
    +'<h1>'+projectNaam+'</h1>'
    +'<p>'+list.length+' talent'+(list.length!==1?'en':'')+(new Date()).toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'})+'</p>'
    +'<div class="grid">'+cards+'</div>'
    +'</body></html>');
  win.document.close();
  win.focus();
  setTimeout(()=>{win.print();},800);
  showToast('PDF geopend — sla op als PDF via de printdialoog!');
}

async function exportDOCX(list,projectNaam,b64map){
  if(!window.docx){showToast('docx library niet geladen');return;}
  const {Document,Packer,Paragraph,Table,TableRow,TableCell,ImageRun,TextRun,AlignmentType,WidthType,BorderStyle}=window.docx;

  const COLS=4;
  const rows=[];
  for(let i=0;i<list.length;i+=COLS){
    const rowTalents=list.slice(i,i+COLS);
    // Pad to COLS
    while(rowTalents.length<COLS)rowTalents.push(null);

    const imgCells=rowTalents.map(t=>{
      const b64=t&&b64map[t.id];
      const children=[];
      if(b64){
        try{
          const base64Data=b64.split(',')[1];
          const mimeMatch=b64.match(/data:([^;]+)/);
          const mime=mimeMatch?mimeMatch[1]:'image/jpeg';
          const imgType=mime.includes('png')?'PNG':'JPG';
          children.push(new Paragraph({
            alignment:AlignmentType.CENTER,
            children:[new ImageRun({data:base64Data,transformation:{width:100,height:100},type:imgType})]
          }));
        }catch(e){
          children.push(new Paragraph({text:''}));
        }
      } else if(t){
        children.push(new Paragraph({text:initials(t.naam),alignment:AlignmentType.CENTER}));
      } else {
        children.push(new Paragraph({text:''}));
      }
      return new TableCell({
        children,
        width:{size:25,type:WidthType.PERCENTAGE},
        borders:{top:{style:BorderStyle.NONE},bottom:{style:BorderStyle.NONE},left:{style:BorderStyle.NONE},right:{style:BorderStyle.NONE}},
        margins:{top:80,bottom:80,left:80,right:80}
      });
    });

    const nameCells=rowTalents.map(t=>new TableCell({
      children:[new Paragraph({
        alignment:AlignmentType.CENTER,
        children:[new TextRun({text:t?t.naam:'',bold:true,size:20})]
      })],
      width:{size:25,type:WidthType.PERCENTAGE},
      borders:{top:{style:BorderStyle.NONE},bottom:{style:BorderStyle.NONE},left:{style:BorderStyle.NONE},right:{style:BorderStyle.NONE}},
      margins:{top:0,bottom:160,left:80,right:80}
    }));

    rows.push(new TableRow({children:imgCells}));
    rows.push(new TableRow({children:nameCells}));
  }

  const doc=new Document({
    sections:[{
      properties:{},
      children:[
        new Paragraph({children:[new TextRun({text:projectNaam,bold:true,size:32})],spacing:{after:120}}),
        new Paragraph({children:[new TextRun({text:list.length+' talent'+(list.length!==1?'en':''),color:'888888',size:18})],spacing:{after:400}}),
        new Table({rows,width:{size:100,type:WidthType.PERCENTAGE}})
      ]
    }]
  });

  const blob=await Packer.toBlob(doc);
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=projectNaam.replace(/[^a-zA-Z0-9]/g,'_')+'_talenten.docx';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Word-bestand gedownload!');
}

// ── IMPORT ────────────────────────────────────────────────────────────
function openImport(){
  document.getElementById('csv-import-input').value='';
  document.getElementById('csv-import-input').click();
}

async function handleCSVImport(e){
  const file=e.target.files[0]; if(!file)return;
  const text=await file.text();
  const lines=text.replace(/\r/g,"").split("\n").filter(l=>l.trim());
  if(!lines.length){showToast('Leeg bestand');return;}

  // Detect header row
  const firstLower=lines[0].toLowerCase();
  const hasHeader=firstLower.includes('naam')||firstLower.includes('name');
  const dataLines=hasHeader?lines.slice(1):lines;

  // Parse CSV columns: Naam, Categorie, Genre, Management (all optional except naam)
  const parsed=dataLines.map(line=>{
    // Handle quoted fields
    const cols=[];
    let cur='', inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=c;}
    }
    cols.push(cur.trim());
    return cols;
  }).filter(c=>c[0]);

  if(!parsed.length){showToast('Geen namen gevonden');return;}

  // Detect columns from header
  let naamIdx=0,catIdx=-1,genreIdx=-1,mgmtIdx=-1;
  if(hasHeader){
    const hdr=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
    hdr.forEach((h,i)=>{
      if(h.includes('naam')||h.includes('name'))naamIdx=i;
      else if(h.includes('cat'))catIdx=i;
      else if(h.includes('genre'))genreIdx=i;
      else if(h.includes('mgmt')||h.includes('management')||h.includes('contact'))mgmtIdx=i;
    });
  }

  // Show preview modal
  document.getElementById('overlay').classList.add('open');
  const inner=document.getElementById('modal-inner');
  inner.innerHTML='';

  const header=document.createElement('div');
  header.className='modal-header';
  const title=document.createElement('span');
  title.className='modal-title'; title.textContent='CSV IMPORTEREN';
  const xbtn=document.createElement('button');
  xbtn.style.cssText='background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;';
  xbtn.textContent='×'; xbtn.onclick=closeModal;
  header.appendChild(title); header.appendChild(xbtn);
  inner.appendChild(header);

  const desc=document.createElement('div');
  desc.style.cssText='font-size:13px;color:var(--text2);';
  desc.textContent=parsed.length+' talent'+(parsed.length!==1?'en':'')+' gevonden. Eerste 5 als voorbeeld:';
  inner.appendChild(desc);

  const preview=document.createElement('div');
  preview.style.cssText='background:var(--surface2);border-radius:var(--radius);padding:10px 14px;font-size:13px;display:flex;flex-direction:column;gap:4px;';
  parsed.slice(0,5).forEach(cols=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:8px;';
    const avatar=document.createElement('div');
    const naam=cols[naamIdx]||'';
    avatar.style.cssText='width:28px;height:28px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;';
    avatar.textContent=initials(naam)||'?';
    const name=document.createElement('span');
    name.textContent=naam;
    row.appendChild(avatar); row.appendChild(name);
    preview.appendChild(row);
  });
  if(parsed.length>5){
    const more=document.createElement('div');
    more.style.cssText='color:var(--text3);font-size:12px;margin-top:4px;';
    more.textContent='+ nog '+(parsed.length-5)+' meer...';
    preview.appendChild(more);
  }
  inner.appendChild(preview);

  const importBtn=document.createElement('button');
  importBtn.className='btn-primary';
  importBtn.style.cssText='padding:10px;font-size:14px;';
  importBtn.textContent='Importeer '+parsed.length+' talenten';
  importBtn.onclick=()=>doImport(parsed,naamIdx,catIdx,genreIdx,mgmtIdx);
  inner.appendChild(importBtn);

  const cancelBtn=document.createElement('button');
  cancelBtn.textContent='Annuleren';
  cancelBtn.onclick=closeModal;
  inner.appendChild(cancelBtn);

  window._importParsed=parsed;
  window._importIndices={naamIdx,catIdx,genreIdx,mgmtIdx};
}

async function doImport(parsed,naamIdx,catIdx,genreIdx,mgmtIdx){
  closeModal();
  showToast('Bezig met importeren...');
  let success=0, failed=0;

  for(const cols of parsed){
    const naam=(cols[naamIdx]||'').trim();
    if(!naam)continue;
    const cat=catIdx>=0?(cols[catIdx]||'').trim():'';
    const genre=genreIdx>=0?(cols[genreIdx]||'').trim():'';
    const mgmt=mgmtIdx>=0?(cols[mgmtIdx]||'').trim():'';
    const payload={
      naam,
      categorie:cat,
      categorieen:cat?[cat]:[],
      genre,
      genres:genre?[genre]:[],
      mgmt,
      notes:'',
      foto_url:'',
      ig_url:'',ig_followers:null,
      tt_url:'',tt_followers:null,
    };
    const {error}=await db.from('talents').insert(payload);
    if(error)failed++; else success++;
  }

  await loadTalents();
  if(failed>0)showToast(success+' geïmporteerd, '+failed+' mislukt');
  else showToast(success+' talenten geïmporteerd!');
}

(function(){
  const saved=localStorage.getItem('colorMode');
  if(saved==='day'){
    document.body.classList.add('day-mode');
    document.addEventListener('DOMContentLoaded',()=>{
      const btn=document.getElementById('mode-toggle');
      if(btn)btn.textContent='☀️';
    });

})();
